news:
  - date:
    text: Due to the restrictions currently in place because of the COVID-19 pandemic, the organizing committee of EuroMPI/USA
          2020 has decided to hold this year's conference entirely virtually. While there will be no in-person gathering, we
          will still conduct a full technical program and are discussing the best ways to bring that program to the community.
          We are still in the planning phase for how sessions will be held. When those plans are finalized, more details will
          be made available. We look forward to seeing all presenters and attendees virtually this year and to being able to
          regather for a full, in-person conference in the future.
